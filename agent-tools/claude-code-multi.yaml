#!/usr/bin/env -S tmuxp load
# tmuxp (https://tmuxp.git-pull.com/) configuration file, install tmuxp with "uv tool install tmuxp"
session_name: claude-code-multi
# Anchor all panes to the directory the launcher was invoked from (not the justfile
# directory). `just start-agents` sets AGENT_START_DIR to the invocation directory.
# For direct runs, export it yourself, e.g. AGENT_START_DIR="$PWD" ./claude-code-multi.yaml
start_directory: "$AGENT_START_DIR"
# Shared command line for all agents. Each window below appends its agent-specific part.
environment:
  CLAUDE_CMD: "claude --settings '{\"ultracode\":true}' --effort=xhigh --remote-control"
# One window per agent. Each window has two vertically stacked panes (top/bottom):
#   1. the claude agent itself
#   2. a plain shell, pre-typed to cd into the agent's worktree (not executed, since
#      the worktree directory is created by claude and may not exist yet).
windows:
  - window_name: agent-1
    layout: even-vertical
    panes:
      - 'eval "$CLAUDE_CMD -n agent-1 --worktree=agent-1"'
      - shell_command:
          - cmd: 'cd .claude/worktrees/agent-1'
            sleep_before: 2
  - window_name: agent-2
    layout: even-vertical
    panes:
      - 'eval "$CLAUDE_CMD -n agent-2 --worktree=agent-2"'
      - shell_command:
          - cmd: 'cd .claude/worktrees/agent-2'
            sleep_before: 2
  - window_name: agent-3
    layout: even-vertical
    panes:
      - 'eval "$CLAUDE_CMD -n agent-3 --worktree=agent-3"'
      - shell_command:
          - cmd: 'cd .claude/worktrees/agent-3'
            sleep_before: 2
  - window_name: agent-4
    layout: even-vertical
    panes:
      - 'eval "$CLAUDE_CMD -n agent-4 --worktree=agent-4"'
      - shell_command:
          - cmd: 'cd .claude/worktrees/agent-4'
            sleep_before: 2
  - window_name: agent-5
    layout: even-vertical
    panes:
      - 'eval "$CLAUDE_CMD -n agent-5 --worktree=agent-5"'
      - shell_command:
          - cmd: 'cd .claude/worktrees/agent-5'
            sleep_before: 2
